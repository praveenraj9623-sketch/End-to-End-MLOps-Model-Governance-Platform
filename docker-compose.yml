version: "3.9"

services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.10.0
    container_name: attrition-mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlruns/mlflow.db
      --default-artifact-root /mlruns
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(2); s.connect(('127.0.0.1', 5000)); s.close()"]
      interval: 20s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: attrition-fastapi
    ports:
      - "8000:8000"
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    volumes:
      - .:/app
    environment:
      - MODEL_PATH=models/attrition_model.joblib
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - ALLOW_FULL_AUDIT_PAYLOAD=false
    depends_on:
      - mlflow
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 20s
      timeout: 5s
      retries: 5

  streamlit:
    build: .
    container_name: attrition-streamlit
    ports:
      - "8502:8502"
    command: streamlit run app.py --server.address 0.0.0.0 --server.port 8502
    volumes:
      - .:/app
    environment:
      - MODEL_PATH=models/attrition_model.joblib
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - API_BASE_URL=http://api:8000
      - ALLOW_FULL_AUDIT_PAYLOAD=false
    depends_on:
      - api
